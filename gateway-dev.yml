server:
  port: 8080

  cloud:
    gateway:
      default-filters:
        - TokenRelay
      routes:
        - id: patient-service
          uri: lb://MEDICORE-PATIENTS
          predicates:
            - Path=/api/patients/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}